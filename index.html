<!DOCTYPE html>
<html lang="ar" dir="rtl" x-data="taksimApp()" class="dark-theme">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Taksim Point | فرع المنار</title>
    
    <link rel="icon" type="image/png" href="https://cdn.phototourl.com/free/2026-04-06-d0b6c388-fcdf-40fd-a7dc-56a84b8309a2.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Montserrat:wght@400;600;700;900&family=Cinzel+Decorative:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --gold: #D4AF37; 
            --white-gold: #e8d9b6; 
            --bg-main: #080808; 
            --text-main: #ffffff;
            --card-bg: rgba(18, 18, 18, 0.85);
            --border-color: rgba(232, 217, 182, 0.25); 
            --glass-nav: rgba(10, 10, 10, 0.96);
            --marble-img: url('https://www.transparenttextures.com/patterns/black-mamba.png');
            --gold-glow: radial-gradient(circle at 50% 0%, rgba(212, 175, 55, 0.15) 0%, transparent 60%);
        }
        
        body { 
            font-family: 'Montserrat', 'Cairo', sans-serif; 
            background-color: var(--bg-main); 
            background-image: var(--gold-glow), var(--marble-img);
            background-attachment: fixed;
            background-size: cover, auto;
            color: var(--text-main); 
            -webkit-tap-highlight-color: transparent; 
            scroll-behavior: smooth;
        }
        
        [x-cloak] { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .text-brand-gold { color: var(--white-gold) !important; }
        .pdf-title-ar { font-family: 'Cairo', sans-serif; font-weight: 900; }
        .pdf-title-en { font-family: 'Cinzel Decorative', serif; font-weight: 700; letter-spacing: 2px; }
        
        .glass-nav { background: var(--glass-nav); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-color); box-shadow: 0 4px 25px rgba(0,0,0,0.5); }
        
        .slider-container { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; }
        .slide { min-width: 100%; scroll-snap-align: center; }
        .tiktok-container { height: 100dvh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .tiktok-item { height: 100dvh; scroll-snap-align: start; position: relative; }
        
        .theme-card { background-color: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid var(--border-color); box-shadow: 0 8px 32px rgba(0,0,0,0.1); transition: all 0.3s; }
        .watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.05; width: 80%; pointer-events: none; z-index: 0; }

        .category-silhouette { filter: brightness(0.6) contrast(1.2) grayscale(0.2); transition: transform 0.4s; object-fit: cover; object-position: center; }
        .cat-box:hover .category-silhouette { filter: brightness(1) contrast(1.2) grayscale(0); transform: scale(1.1); }

        /* أبعاد الـ PDF */
        .pdf-image {
            position: absolute; inset: 0; width: 100%; height: 100%; 
            object-fit: cover; object-position: right center; 
            z-index: 0; opacity: 0.98;
            mask-image: linear-gradient(to right, transparent 0%, black 20%);
            -webkit-mask-image: linear-gradient(to right, transparent 0%, black 20%);
        }
        
        .pdf-overlay { 
            position: absolute; inset: 0; z-index: 10; pointer-events: none; 
            background: linear-gradient(to right, rgba(8,8,8, 0.98) 50%, rgba(8,8,8, 0.8) 70%, transparent 100%); 
        }
        
        @media (min-width: 768px) {
            .pdf-overlay { background: linear-gradient(to right, rgba(8,8,8, 0.98) 35%, rgba(8,8,8, 0.6) 60%, transparent 100%); }
            .pdf-image { 
                mask-image: linear-gradient(to right, transparent 0%, transparent 25%, black 60%);
                -webkit-mask-image: linear-gradient(to right, transparent 0%, transparent 25%, black 60%);
            }
        }
        
        .drive-iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 0; }
        .maps-frame { width: 100%; height: 250px; border-radius: 15px; border: 1px solid var(--border-color); margin-top: 20px; }
    </style>
</head>
<body class="overflow-x-hidden relative" :dir="isRTL ? 'rtl' : 'ltr'" x-init="initApp()" @scroll.window="handleScroll()">

    <nav class="fixed top-0 w-full z-[100] glass-nav px-3 py-3 flex justify-between items-center" x-show="view !== 'explore'">
        <div class="flex items-center gap-2">
            <img src="https://cdn.phototourl.com/free/2026-04-06-d0b6c388-fcdf-40fd-a7dc-56a84b8309a2.png" alt="Taksim Point" class="h-8 object-contain">
            <span class="text-[10px] font-black text-brand-gold bg-white/5 px-2 py-1 rounded border border-[var(--border-color)]">فرع المنار</span>
        </div>
        
        <div class="flex items-center gap-2">
            <button @click="showSearchModal = true" class="p-1 border border-[var(--border-color)] rounded text-brand-gold hover:bg-[var(--white-gold)] hover:text-black transition shadow-sm">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </button>

            <button @click="showQRModal = true" class="p-1 border border-[var(--border-color)] rounded text-brand-gold hover:bg-[var(--white-gold)] hover:text-black transition shadow-sm">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg>
            </button>
            
            <div class="flex items-center bg-[var(--card-bg)] border border-[var(--border-color)] rounded px-1 py-0.5 shadow-sm">
                <span class="text-xs mr-1">🌍</span>
                <select x-model="currentLang" @change="changeLanguage()" class="bg-transparent text-brand-gold text-[10px] outline-none font-bold cursor-pointer">
                    <template x-for="(url, code) in langLinks" :key="code">
                        <option :value="code" x-text="langNames[code]"></option>
                    </template>
                </select>
            </div>
        </div>
    </nav>

    <div x-show="showSearchModal" x-transition.opacity x-cloak class="fixed inset-0 z-[250] bg-[var(--bg-main)] flex flex-col" style="background-image: var(--marble-img);">
        <div class="flex items-center gap-3 p-4 glass-nav">
            <button @click="showSearchModal = false; searchQuery = ''" class="text-brand-gold p-2 rounded-full transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <input type="text" x-model="searchQuery" :placeholder="t('search_placeholder')" class="flex-1 theme-card rounded-lg px-4 py-2.5 text-[var(--text-main)] text-sm outline-none focus:border-[var(--white-gold)] font-bold">
        </div>
        <div class="flex-1 overflow-y-auto p-5 pb-32">
            <div x-show="searchQuery.trim() === ''" x-transition>
                <div class="grid grid-cols-3 gap-3">
                    <template x-for="cat in normalCategories" :key="cat">
                        <button @click="showSearchModal = false; scrollToCat(cat)" class="theme-card rounded-xl p-4 flex flex-col items-center gap-2 hover:border-[var(--white-gold)] transition">
                            <span class="text-3xl drop-shadow" x-text="getCatEmoji(cat)"></span>
                            <span class="text-[10px] font-bold text-center leading-tight text-brand-gold" x-text="cat"></span>
                        </button>
                    </template>
                </div>
            </div>
            <div x-show="searchQuery.trim() !== ''" x-transition>
                <div class="flex flex-col gap-3">
                    <template x-for="item in searchResults" :key="item.id">
                        <div class="theme-card rounded-xl p-3 flex gap-3 items-center">
                            <img :src="item.image" class="w-16 h-16 rounded-lg object-cover">
                            <div class="flex-1">
                                <h4 class="text-sm font-bold line-clamp-1 text-brand-gold" x-text="item.name"></h4>
                                <span class="font-black text-xs text-brand-gold" x-text="item.price + ' SR'"></span>
                            </div>
                            <button @click="toggleLike(item)" class="p-3 glass-nav rounded-full border border-[var(--border-color)]">
                                <span x-text="isLiked(item.id) ? '❤️' : '🤍'"></span>
                            </button>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>

    <div x-show="showQRModal" x-cloak class="fixed inset-0 z-[200] bg-black/90 flex flex-col items-center justify-center p-6 backdrop-blur-md">
        <button @click="showQRModal = false" class="absolute top-6 right-6 text-white text-3xl font-black">✕</button>
        <div class="theme-card border-[var(--border-color)] p-8 rounded-2xl flex flex-col items-center shadow-[0_0_40px_rgba(232,217,182,0.1)]">
            <h2 class="font-black text-xl mb-1 text-center text-brand-gold">تقسيم بوينت | فرع المنار</h2>
            <div class="bg-white p-3 rounded-xl mb-6">
                <img :src="'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(window.location.href)" class="w-48 h-48">
            </div>
            <button @click="copyBranchUrl()" class="w-full bg-gradient-to-r from-[var(--white-gold)] to-[#B38728] text-black font-black py-3 rounded-lg flex items-center justify-center gap-2">🔗 نسخ رابط المنيو</button>
        </div>
    </div>

    <div x-show="isLoading" class="fixed inset-0 z-[200] bg-[var(--bg-main)] flex flex-col items-center justify-center" style="background-image: var(--marble-img);">
        <img src="https://cdn.phototourl.com/free/2026-04-06-d0b6c388-fcdf-40fd-a7dc-56a84b8309a2.png" class="h-20 mb-6 animate-pulse">
        <div class="text-brand-gold text-sm font-black tracking-widest uppercase">Taksim Point Al-Manar...</div>
    </div>

    <div x-show="view === 'home' && !isLoading" class="pb-32 pt-24">
        <section class="px-6 mb-12 text-center">
            <img src="https://cdn.phototourl.com/free/2026-04-06-d0b6c388-fcdf-40fd-a7dc-56a84b8309a2.png" class="h-20 mx-auto mb-6 object-contain">
            <h1 class="text-2xl font-black mb-4 text-center text-brand-gold" x-text="t('about_title')"></h1>
            <p class="text-sm text-brand-gold opacity-90 leading-relaxed text-justify px-2 mb-4 font-semibold" x-text="t('about_p1')"></p>
        </section>

        <section class="relative h-[35vh] w-full mb-12 px-4">
            <div class="slider-container h-full no-scrollbar rounded-xl shadow-2xl" id="hero-slider">
                <template x-for="(item, index) in heroOffers" :key="item.id">
                    <div class="slide relative h-full theme-card rounded-xl overflow-hidden" :id="'hero-slide-' + index">
                        <img :src="item.image" loading="lazy" class="w-full h-full object-cover opacity-90">
                        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent flex flex-col justify-end p-5">
                            <h2 class="text-2xl font-black mb-1 text-brand-gold" x-text="item.name"></h2>
                            <div class="flex justify-between items-center">
                                <span class="text-xl font-black text-brand-gold" x-text="item.price + ' SR'"></span>
                                <button @click="scrollToCat(item.category)" class="bg-[var(--white-gold)] text-black px-4 py-1.5 text-xs font-black rounded shadow-lg">اطلب الآن</button>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </section>

        <section class="px-6 mb-10">
            <h3 class="text-lg font-black mb-4 text-center text-brand-gold">موقعنا بالمنار</h3>
            <div class="overflow-hidden rounded-2xl shadow-xl">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3709.337719636151!2d39.2351679!3d21.611759899999996!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x15c3d7b9dddb95e7%3A0x2677df1329110619!2z2YXYt9i52YUg2KrZgtiz2YrZhSDYqNmI2YrZhtiq!5e0!3m2!1sar!2ssa!4v1776356612629!5m2!1sar!2ssa" width="100%" height="250" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </section>

        <section class="px-5 mb-10">
            <h3 class="text-lg font-black mb-6 text-center uppercase text-brand-gold" x-text="t('nav_menu')"></h3>
            <div class="grid grid-cols-2 gap-3">
                <template x-for="cat in normalCategories" :key="cat">
                    <button @click="scrollToCat(cat)" class="cat-box theme-card relative h-28 rounded-xl overflow-hidden flex items-center justify-center border border-[var(--border-color)]">
                        <img :src="getCategoryBg(cat)" class="absolute inset-0 w-full h-full category-silhouette">
                        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/60 to-black/20"></div>
                        <span class="relative z-10 font-black text-sm text-center px-1 text-brand-gold" x-text="cat"></span>
                    </button>
                </template>
            </div>
        </section>
    </div>

    <div x-show="view === 'menu'" class="min-h-screen pt-20 pb-32">
        <div class="fixed top-[65px] left-0 w-full z-40 transition-transform duration-300" :class="showCatBar ? 'translate-y-0' : '-translate-y-full'">
            <div class="flex gap-2 overflow-x-auto no-scrollbar px-4 py-2 glass-nav border-b border-[var(--border-color)]">
                <template x-for="cat in normalCategories" :key="cat">
                    <button @click="scrollToCat(cat)" class="px-4 py-2 text-xs font-black whitespace-nowrap text-brand-gold opacity-70 hover:opacity-100 transition" x-text="cat"></button>
                </template>
            </div>
        </div>

        <div class="px-4 mt-12">
            <template x-for="cat in normalCategories" :key="cat">
                <div class="mb-16 relative rounded-xl overflow-hidden shadow-2xl border border-[var(--border-color)] scroll-mt-[130px] min-h-[85vh] bg-[var(--bg-main)]" :id="'cat-' + btoa(unescape(encodeURIComponent(cat))).replace(/=/g, '')">
                    <img :src="getCategoryBg(cat)" loading="lazy" class="pdf-image">
                    <div class="pdf-overlay"></div>
                    <div class="absolute inset-y-0 left-0 w-[85%] md:w-[50%] z-20 p-5 md:p-10 flex flex-col overflow-y-auto no-scrollbar" dir="rtl">
                        <div class="mb-8 border-r-4 border-[var(--white-gold)] pr-4">
                            <h2 class="text-3xl md:text-5xl pdf-title-ar mb-1 text-brand-gold" x-text="cat"></h2>
                            <h3 class="text-xs md:text-sm pdf-title-en text-brand-gold opacity-70 uppercase tracking-widest" x-text="getEnglishCat(cat)"></h3>
                        </div>
                        <div class="flex flex-col gap-6 pb-20">
                            <template x-for="item in getCatItems(cat)" :key="item.id">
                                <div class="flex flex-col relative group theme-card rounded-lg p-3 border border-[var(--border-color)]/50 backdrop-blur-sm">
                                    <div class="flex items-end w-full mb-1.5 gap-1">
                                        <h4 class="font-bold text-sm md:text-base leading-tight whitespace-normal max-w-[70%] text-brand-gold" x-text="item.name"></h4>
                                        <div class="flex-1 border-b-2 border-dotted border-[var(--white-gold)]/40 relative top-[-4px] min-w-[10px]"></div>
                                        <span class="text-brand-gold font-black text-sm md:text-base whitespace-nowrap" x-text="item.price + ' SR'"></span>
                                    </div>
                                    <div class="flex justify-between items-start gap-2">
                                        <p class="text-[11px] md:text-xs text-brand-gold opacity-80 font-bold line-clamp-2 flex-1 pr-1" x-text="item.description"></p>
                                        <button @click="toggleLike(item)" class="p-1 glass-nav rounded-full border border-[var(--border-color)]">
                                            <span x-text="isLiked(item.id) ? '❤️' : '🤍'" class="text-[10px]"></span>
                                        </button>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <div class="fixed bottom-0 w-full glass-nav px-4 py-3 z-[150]">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <button @click="view = 'home'" :class="view === 'home' ? 'text-brand-gold' : 'text-brand-gold opacity-50'" class="flex flex-col items-center gap-1 w-1/3 transition">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3l9 7.5v10.5h-6v-6h-6v6h-6v-10.5z"/></svg>
                <span class="text-[10px] font-black">الرئيسية</span>
            </button>
            <button @click="view = 'menu'" :class="view === 'menu' ? 'text-brand-gold' : 'text-brand-gold opacity-50'" class="flex flex-col items-center gap-1 w-1/3 transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"></path></svg>
                <span class="text-[10px] font-black">المنيو</span>
            </button>
            <button @click="view = 'likes'" :class="view === 'likes' ? 'text-brand-gold' : 'text-brand-gold opacity-50'" class="flex flex-col items-center gap-1 relative w-1/3 transition">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                <span x-show="likes.length > 0" class="absolute -top-1 right-2 bg-red-600 text-white text-[9px] font-bold w-4 h-4 rounded-full flex items-center justify-center" x-text="likes.length"></span>
                <span class="text-[10px] font-black">طلباتي</span>
            </button>
        </div>
    </div>

    <script>
        function taksimApp() {
            return {
                isLoading: true, view: 'home', currentLang: 'ar', currentBranch: 'almanar',
                showSearchModal: false, showQRModal: false, searchQuery: '', showCatBar: true, lastScroll: 0,
                allRawData: [], activeMenuItems: [], heroOffers: [], globalImages: {}, categoryBgs: {}, likes: [], quantities: {},
                targetHeroIds: ['TP-116', 'TP-185', 'TP-186', 'TP-003', 'TP-004'],

                langNames: { 
                    ar: 'ar العربية', en: 'en English', tr: 'tr Türkçe', es: 'es Español', ru: 'ru Русский', 
                    ur: 'ur اردو', hi: 'hi हिन्दी', fr: 'fr Français', de: 'de Deutsch', zh: 'zh 中文', 
                    ja: 'ja 日本語', ko: 'ko 한국어', it: 'it Italiano', vi: 'vi Tiếng Việt', th: 'th ไทย', id: 'id Indonesia' 
                },
                langLinks: {
                    ar: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT5mVYN6jmz_eUl2t-4KeS9t9KF34tKv2GYbXiJezxDN79MX97QzZnPRSkliL9E9tAeACReVmOzmGhc/pub?gid=2026156602&single=true&output=csv',
                    en: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT5mVYN6jmz_eUl2t-4KeS9t9KF34tKv2GYbXiJezxDN79MX97QzZnPRSkliL9E9tAeACReVmOzmGhc/pub?gid=1709873212&single=true&output=csv',
                    tr: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT5mVYN6jmz_eUl2t-4KeS9t9KF34tKv2GYbXiJezxDN79MX97QzZnPRSkliL9E9tAeACReVmOzmGhc/pub?gid=932024028&single=true&output=csv',
                    es: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT5mVYN6jmz_eUl2t-4KeS9t9KF34tKv2GYbXiJezxDN79MX97QzZnPRSkliL9E9tAeACReVmOzmGhc/pub?gid=2126154876&single=true&output=csv',
                    ru: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT5mVYN6jmz_eUl2t-4KeS9t9KF34tKv2GYbXiJezxDN79MX97QzZnPRSkliL9E9tAeACReVmOzmGhc/pub?gid=1383179966&single=true&output=csv',
                    ur: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT5mVYN6jmz_eUl2t-4KeS9t9KF34tKv2GYbXiJezxDN79MX97QzZnPRSkliL9E9tAeACReVmOzmGhc/pub?gid=1356221249&single=true&output=csv',
                    hi: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT5mVYN6jmz_eUl2t-4KeS9t9KF34tKv2GYbXiJezxDN79MX97QzZnPRSkliL9E9tAeACReVmOzmGhc/pub?gid=1947060246&single=true&output=csv',
                    fr: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT5mVYN6jmz_eUl2t-4KeS9t9KF34tKv2GYbXiJezxDN79MX97QzZnPRSkliL9E9tAeACReVmOzmGhc/pub?gid=1967929524&single=true&output=csv',
                    de: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT5mVYN6jmz_eUl2t-4KeS9t9KF34tKv2GYbXiJezxDN79MX97QzZnPRSkliL9E9tAeACReVmOzmGhc/pub?gid=330421505&single=true&output=csv',
                    zh: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT5mVYN6jmz_eUl2t-4KeS9t9KF34tKv2GYbXiJezxDN79MX97QzZnPRSkliL9E9tAeACReVmOzmGhc/pub?gid=597359201&single=true&output=csv',
                    ja: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT5mVYN6jmz_eUl2t-4KeS9t9KF34tKv2GYbXiJezxDN79MX97QzZnPRSkliL9E9tAeACReVmOzmGhc/pub?gid=1140262731&single=true&output=csv',
                    ko: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT5mVYN6jmz_eUl2t-4KeS9t9KF34tKv2GYbXiJezxDN79MX97QzZnPRSkliL9E9tAeACReVmOzmGhc/pub?gid=961009172&single=true&output=csv',
                    it: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT5mVYN6jmz_eUl2t-4KeS9t9KF34tKv2GYbXiJezxDN79MX97QzZnPRSkliL9E9tAeACReVmOzmGhc/pub?gid=1885756520&single=true&output=csv',
                    vi: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT5mVYN6jmz_eUl2t-4KeS9t9KF34tKv2GYbXiJezxDN79MX97QzZnPRSkliL9E9tAeACReVmOzmGhc/pub?gid=37768217&single=true&output=csv',
                    th: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT5mVYN6jmz_eUl2t-4KeS9t9KF34tKv2GYbXiJezxDN79MX97QzZnPRSkliL9E9tAeACReVmOzmGhc/pub?gid=369450170&single=true&output=csv',
                    id: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT5mVYN6jmz_eUl2t-4KeS9t9KF34tKv2GYbXiJezxDN79MX97QzZnPRSkliL9E9tAeACReVmOzmGhc/pub?gid=1467238039&single=true&output=csv'
                },

                get isRTL() { return ['ar', 'ur'].includes(this.currentLang); },
                t(key) { 
                    const dicts = {
                        ar: { about_title: "تقسيم بوينت | المنار", about_p1: "نرحب بكم في فرع المنار، حيث نقدم أفضل المشويات التركية والعالمية.", nav_menu: "قائمة الطعام", search_placeholder: "ابحث عن طبق..." },
                        en: { about_title: "Taksim Point | Al-Manar", about_p1: "Welcome to Al-Manar branch, serving the best Turkish grills.", nav_menu: "Food Menu", search_placeholder: "Search..." }
                    };
                    return dicts[this.currentLang]?.[key] || dicts['ar'][key];
                },

                handleScroll() {
                    const y = window.pageYOffset;
                    this.showCatBar = y <= this.lastScroll || y < 100;
                    this.lastScroll = y;
                },

                async changeLanguage() {
                    this.isLoading = true;
                    try {
                        const res = await fetch(this.langLinks[this.currentLang] + '&t=' + Date.now());
                        const text = await res.text();
                        Papa.parse(text, {
                            header: false, skipEmptyLines: true,
                            complete: (results) => {
                                const rows = results.data.slice(1);
                                this.allRawData = rows.map(cols => {
                                    let id = (cols[0] || '').trim();
                                    let cat = (cols[1] || '').trim();
                                    let numId = parseInt(id.replace('TP-', ''));
                                    if(numId >= 250 && numId <= 400 && cat) this.categoryBgs[cat] = (cols[6] || '').trim();
                                    return {
                                        id: id, category: cat, name: (cols[2] || '').trim(),
                                        price: (cols[3] || '').trim(), description: (cols[5] || '').trim(),
                                        image: (cols[6] || '').trim() || this.globalImages[id] || '',
                                        available: (cols[7] || '').trim() // توفر الفرع
                                    }
                                }).filter(i => i.id.startsWith('TP-'));
                                this.updateBranchData();
                            }
                        });
                    } catch (e) { this.isLoading = false; }
                },

                updateBranchData() {
                    this.activeMenuItems = this.allRawData.filter(i => i.available !== 'غير متوفر' && (parseInt(i.id.replace('TP-','')) < 250 || parseInt(i.id.replace('TP-','')) > 400));
                    this.heroOffers = this.activeMenuItems.filter(i => this.targetHeroIds.includes(i.id));
                    this.isLoading = false;
                },

                get searchResults() {
                    const q = this.searchQuery.toLowerCase();
                    return q ? this.activeMenuItems.filter(i => i.name.toLowerCase().includes(q)) : [];
                },

                get normalCategories() { return [...new Set(this.activeMenuItems.map(i => i.category))].filter(c => c); },
                getCatItems(cat) { return this.activeMenuItems.filter(i => i.category === cat); },
                getCategoryBg(cat) { return this.categoryBgs[cat] || ''; },
                getEnglishCat(cat) { return "TAKSIM MENU"; },
                getCatEmoji(cat) {
                    const c = cat.toLowerCase();
                    if(c.includes('فطور')) return '🍳'; if(c.includes('مشوي')) return '🍢';
                    if(c.includes('برجر')) return '🍔'; if(c.includes('بيتزا')) return '🍕';
                    return '🍽️';
                },

                scrollToCat(cat) {
                    this.view = 'menu';
                    const id = 'cat-' + btoa(unescape(encodeURIComponent(cat))).replace(/=/g, '');
                    setTimeout(() => {
                        const el = document.getElementById(id);
                        if(el) window.scrollTo({top: el.offsetTop - 120, behavior: 'smooth'});
                    }, 100);
                },

                toggleLike(item) {
                    if(this.likes.includes(item.id)) this.likes = this.likes.filter(id => id !== item.id);
                    else { this.likes.push(item.id); this.quantities[item.id] = 1; }
                },
                isLiked(id) { return this.likes.includes(id); },
                updateQty(id, d) { this.quantities[id] = Math.max(1, (this.quantities[id] || 1) + d); },
                get likedItemsList() { return this.likes.map(id => this.allRawData.find(i => i.id === id)).filter(Boolean); },
                getBranchUrl() { return window.location.origin + window.location.pathname; },
                copyBranchUrl() { navigator.clipboard.writeText(this.getBranchUrl()).then(() => alert('تم النسخ!')); },

                initApp() { this.changeLanguage(); }
            }
        }
    </script>
